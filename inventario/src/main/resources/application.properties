#  SERVIDOR
spring.application.name=inventario
server.port=8087

#  BASE DE DATOS
spring.datasource.url=jdbc:mysql://localhost:3306/db_inventario?useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true

#  FLYWAY
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

#  EUREKA
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true

#  JWT
jwt.secret=una_clave_secreta_larga_y_segura_de_al_menos_32_bytes

#  WEBCLIENT URLS
reparacion.url=http://localhost:8086
equipo.url=http://localhost:8090
