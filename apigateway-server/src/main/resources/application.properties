spring.application.name=apigateway-server
server.port=8080
eureka.client.service-url.defaultZone=http://localhost:8761/eureka
spring.cloud.gateway.mvc.routes[0].id=auth
spring.cloud.gateway.mvc.routes[0].uri=lb://auth
spring.cloud.gateway.mvc.routes[0].predicates[0]=Path=/api/v1/auth/**

spring.cloud.gateway.mvc.routes[1].id=cliente
spring.cloud.gateway.mvc.routes[1].uri=lb://cliente
spring.cloud.gateway.mvc.routes[1].predicates[0]=Path=/api/v1/clientes/**

spring.cloud.gateway.mvc.routes[2].id=equipo
spring.cloud.gateway.mvc.routes[2].uri=lb://equipo
spring.cloud.gateway.mvc.routes[2].predicates[0]=Path=/api/v1/equipos/**

spring.cloud.gateway.mvc.routes[3].id=orden-trabajo
spring.cloud.gateway.mvc.routes[3].uri=lb://orden_trabajo
spring.cloud.gateway.mvc.routes[3].predicates[0]=Path=/api/v1/ot/**