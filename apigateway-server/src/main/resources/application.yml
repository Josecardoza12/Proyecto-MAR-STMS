spring:
  application:
    name: apigateway-server

  cloud:
    gateway:
      routes:

        - id: auth
          uri: lb://AUTH
          predicates:
            - Path=/api/v1/auth/**

        - id: cliente
          uri: lb://CLIENTE
          predicates:
            - Path=/api/v1/clientes/**

        - id: equipo
          uri: lb://EQUIPO
          predicates:
            - Path=/api/v1/equipos/**

        - id: orden-trabajo
          uri: lb://orden-trabajo
          predicates:
            - Path=/api/v1/ot/**

        - id: bodega
          uri: lb://BODEGA
          predicates:
            - Path=/api/v1/bodega/**


server:
  port: 8080

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka

logging:
  level:
    org.springframework.cloud.gateway: DEBUG