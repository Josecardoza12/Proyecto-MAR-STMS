spring:
  application:
    name: apigateway-server

  cloud:
    gateway:
      routes:

        - id: auth
          uri: lb://AUTH
          predicates:
            - Path=/api/v1/auth/**

        - id: cliente
          uri: lb://CLIENTE
          predicates:
            - Path=/api/v1/clientes/**

        - id: equipo
          uri: lb://EQUIPO
          predicates:
            - Path=/api/v1/equipos/**

        - id: orden_trabajo
          uri: lb://orden_trabajo
          predicates:
            - Path=/api/v1/ot/**

        - id: diagnostico
          uri: lb://DIAGNOSTICO
          predicates:
            - Path=/api/v1/diagnosticos/**
        - id: reparacion
          uri: lb://REPARACION
          predicates:
            - Path=/api/v1/reparaciones/**
        - id: inventario
          uri: lb://INVENTARIO
          predicates:
            - Path=/api/v1/inventarios/**

        - id: bodega
          uri: lb://BODEGA
          predicates:
            - Path=/api/v1/bodega/**
        - id: pago
          uri: lb://PAGO
          predicates:
            - Path=/api/v1/pagos/**
        - id: finanzas
          uri: lb://FINANZAS
          predicates:
            - Path=/api/v1/finanzas/**

server:
  port: 8080

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka

logging:
  level:
    org.springframework.cloud.gateway: DEBUG